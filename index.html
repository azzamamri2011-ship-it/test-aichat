<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaam-Asisten Enterprise v4.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

        :root {
            --zaam-primary: #6366f1;
            --zaam-bg: #050507;
            --zaam-surface: rgba(15, 15, 20, 0.9);
            --zaam-border: rgba(255, 255, 255, 0.08);
            --zaam-glow: rgba(99, 102, 241, 0.15);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--zaam-bg);
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, var(--zaam-glow) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
        }

        .zaam-glass {
            background: var(--zaam-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--zaam-border);
        }

        .sidebar-premium {
            background: rgba(8, 8, 10, 1);
            border-right: 1px solid var(--zaam-border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-canvas::-webkit-scrollbar { width: 5px; }
        .chat-canvas::-webkit-scrollbar-track { background: transparent; }
        .chat-canvas::-webkit-scrollbar-thumb { 
            background: var(--zaam-border); 
            border-radius: 20px;
        }

        .prose pre {
            background: #000000 !important;
            border: 1px solid var(--zaam-border);
            padding: 1.25rem;
            border-radius: 14px;
            margin: 1rem 0;
        }

        .status-pill {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
        }

        .input-container {
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid var(--zaam-border);
            border-radius: 24px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: var(--zaam-primary);
            border-radius: 50%;
            animation: pulseAnim 1.4s infinite ease-in-out both;
        }
        @keyframes pulseAnim {
            0%, 80%, 100% { transform: scale(0.3); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 1024px) {
            #sidebar { position: fixed; height: 100%; z-index: 100; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="flex w-full" id="app-root">

    <button id="mobile-toggle" onclick="toggleSidebar()" class="lg:hidden fixed top-4 left-4 z-[110] w-10 h-10 zaam-glass rounded-xl flex items-center justify-center text-zinc-400">
        <i class="fas fa-bars"></i>
    </button>

    <aside id="sidebar" class="w-80 sidebar-premium flex flex-col p-6 shrink-0 transition-transform lg:translate-x-0">
        <div class="flex items-center gap-4 mb-10 px-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fas fa-microchip text-white text-lg"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg text-white">Zaam-Asisten</h1>
                <p class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Enterprise Protocol</p>
            </div>
        </div>

        <button onclick="createNewChat()" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-all flex items-center justify-center gap-3 text-[11px] font-bold uppercase mb-8">
            <i class="fas fa-plus-circle"></i> Sesi Baru
        </button>

        <div class="flex-1 overflow-y-auto space-y-2 chat-canvas" id="history-list">
            </div>
    </aside>

    <main class="flex-1 flex flex-col relative min-w-0">
        <header class="h-20 zaam-glass px-8 flex items-center justify-between shrink-0 z-50 border-t-0 border-x-0">
            <div class="flex items-center gap-4">
                <div class="status-pill flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span id="status-text">ACTIVE ENGINE</span>
                </div>
            </div>

            <select id="engine-selector" class="bg-zinc-900 border border-zinc-800 text-[10px] font-bold text-zinc-300 py-2.5 px-6 rounded-xl outline-none focus:border-indigo-500 uppercase cursor-pointer">
                <option value="gpt">GPT-4 Turbo (Stable)</option>
                <option value="gemini">Gemini Pro (Vision)</option>
            </select>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto px-6 md:px-12 py-10 space-y-12 chat-canvas">
            <div id="messages-container" class="max-w-4xl mx-auto space-y-12">
                </div>
        </div>

        <div id="typing-box" class="hidden absolute bottom-32 left-0 right-0 z-10">
            <div class="max-w-4xl mx-auto px-12">
                <div class="flex items-center gap-3 text-indigo-400 font-bold uppercase text-[10px]">
                    <div class="flex gap-1.5">
                        <div class="pulse-dot"></div>
                        <div class="pulse-dot" style="animation-delay: 0.2s"></div>
                        <div class="pulse-dot" style="animation-delay: 0.4s"></div>
                    </div>
                    Processing Neural Link
                </div>
            </div>
        </div>

        <footer class="p-6 md:p-10 shrink-0">
            <div class="max-w-4xl mx-auto">
                <div id="file-shelf" class="hidden flex flex-wrap gap-3 mb-4"></div>

                <div class="input-container p-2">
                    <div class="flex items-end gap-2 px-3">
                        <input type="file" id="file-upload" class="hidden" multiple onchange="handleFileSelect(event)">
                        <button onclick="document.getElementById('file-upload').click()" class="mb-1.5 w-11 h-11 hover:bg-white/5 rounded-2xl flex items-center justify-center text-zinc-500">
                            <i class="fas fa-paperclip text-lg"></i>
                        </button>

                        <textarea id="user-input" rows="1" placeholder="Ketik pesan..." class="w-full bg-transparent border-none focus:ring-0 py-4 px-2 text-zinc-100 text-base resize-none" oninput="autoResize(this)"></textarea>

                        <button id="send-btn" onclick="handleSend()" class="mb-1.5 w-11 h-11 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl flex items-center justify-center shadow-lg transition-all active:scale-90">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
</body>
</html>
