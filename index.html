<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaam-Asisten Enterprise v4.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

        :root {
            --zaam-primary: #6366f1;
            --zaam-bg: #050507;
            --zaam-surface: rgba(15, 15, 20, 0.9);
            --zaam-border: rgba(255, 255, 255, 0.08);
            --zaam-glow: rgba(99, 102, 241, 0.15);
        }

        /* Anti-Music Player Reset */
        audio, video, [role="application"] { display: none !important; }
        #app-root { display: flex !important; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--zaam-bg);
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, var(--zaam-glow) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
        }

        .zaam-glass {
            background: var(--zaam-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--zaam-border);
        }

        .sidebar-premium {
            background: rgba(8, 8, 10, 1);
            border-right: 1px solid var(--zaam-border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Chat Layout Styles */
        .chat-canvas::-webkit-scrollbar { width: 5px; }
        .chat-canvas::-webkit-scrollbar-track { background: transparent; }
        .chat-canvas::-webkit-scrollbar-thumb { 
            background: var(--zaam-border); 
            border-radius: 20px;
        }

        .msg-bubble {
            max-width: 85%;
            animation: msgFadeUp 0.5s ease-out forwards;
        }

        @keyframes msgFadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography & Prose */
        .prose pre {
            background: #000000 !important;
            border: 1px solid var(--zaam-border);
            padding: 1.25rem;
            border-radius: 14px;
            margin: 1rem 0;
        }

        .prose code {
            font-family: 'Fira Code', monospace;
            color: #818cf8;
            font-size: 0.9em;
        }

        /* Component Details */
        .status-pill {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .history-item {
            padding: 12px;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.03);
            border-color: var(--zaam-border);
        }

        .input-container {
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid var(--zaam-border);
            border-radius: 24px;
            transition: all 0.3s;
        }

        .input-container:focus-within {
            border-color: var(--zaam-primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
        }

        /* Loading Indicator */
        .pulse-dot {
            width: 6px;
            height: 6px;
            background: var(--zaam-primary);
            border-radius: 50%;
            animation: pulseAnim 1.4s infinite ease-in-out both;
        }
        @keyframes pulseAnim {
            0%, 80%, 100% { transform: scale(0.3); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Responsiveness */
        @media (max-width: 1024px) {
            #sidebar { position: fixed; height: 100%; z-index: 100; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="flex w-full" id="app-root">

    <button onclick="toggleSidebar()" class="lg:hidden fixed top-4 left-4 z-[110] w-10 h-10 zaam-glass rounded-xl flex items-center justify-center text-zinc-400">
        <i class="fas fa-bars"></i>
    </button>

    <aside id="sidebar" class="w-80 sidebar-premium flex flex-col p-6 shrink-0">
        <div class="flex items-center gap-4 mb-10 px-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i class="fas fa-microchip text-white text-lg"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg text-white leading-tight">Zaam-Asisten</h1>
                <p class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest mt-0.5">Enterprise Protocol</p>
            </div>
        </div>

        <button onclick="createNewSession()" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-all flex items-center justify-center gap-3 text-[11px] font-bold uppercase tracking-widest mb-8">
            <i class="fas fa-plus-circle"></i> Sesi Baru
        </button>

        <div class="flex-1 overflow-y-auto space-y-2 chat-canvas pr-2" id="history-box">
            <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest ml-2 mb-4">Percakapan Terakhir</p>
            </div>

        <div class="pt-6 border-t border-white/5 mt-auto">
            <div class="p-4 zaam-glass rounded-2xl flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center border-2 border-white/10">
                    <i class="fas fa-shield-halved text-[10px] text-white"></i>
                </div>
                <div class="overflow-hidden">
                    <p class="text-xs font-bold text-white truncate">Pro Account</p>
                    <p class="text-[9px] text-emerald-500 font-bold uppercase tracking-tighter">Verified Connection</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative min-w-0">
        <header class="h-20 zaam-glass px-8 flex items-center justify-between shrink-0 z-50 border-t-0 border-x-0">
            <div class="flex items-center gap-4">
                <div class="status-pill flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    ACTIVE ENGINE
                </div>
                <span id="model-indicator" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest hidden md:block">| Handshake Protocol v4.5</span>
            </div>

            <div class="flex items-center gap-3">
                <div class="relative group">
                    <select id="engine-select" class="appearance-none bg-zinc-900 border border-zinc-800 text-[10px] font-bold text-zinc-300 py-2.5 px-6 rounded-xl outline-none focus:border-indigo-500 transition-all uppercase tracking-widest cursor-pointer pr-10">
                        <option value="gpt">GPT-4 Turbo (Stable)</option>
                        <option value="gemini">Gemini Pro (Vision)</option>
                    </select>
                    <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-[8px] text-zinc-500 pointer-events-none"></i>
                </div>
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto px-6 md:px-12 py-10 space-y-12 chat-canvas">
            <div id="message-flow" class="max-w-4xl mx-auto space-y-12">
                </div>
        </div>

        <div id="typing-state" class="hidden absolute bottom-32 left-0 right-0 z-10">
            <div class="max-w-4xl mx-auto px-12">
                <div class="flex items-center gap-3 text-indigo-400 font-bold uppercase tracking-[0.2em] text-[10px]">
                    <div class="flex gap-1.5">
                        <div class="pulse-dot"></div>
                        <div class="pulse-dot" style="animation-delay: 0.2s"></div>
                        <div class="pulse-dot" style="animation-delay: 0.4s"></div>
                    </div>
                    Processing Neural Link
                </div>
            </div>
        </div>

        <footer class="p-6 md:p-10 shrink-0 bg-transparent">
            <div class="max-w-4xl mx-auto">
                <div id="preview-shelf" class="hidden flex flex-wrap gap-3 mb-4 p-2"></div>

                <div class="input-container p-2 relative">
                    <div class="flex items-end gap-2 px-3">
                        <input type="file" id="file-upload" class="hidden" multiple onchange="processFiles(event)">
                        
                        <button onclick="document.getElementById('file-upload').click()" class="mb-1.5 w-11 h-11 hover:bg-white/5 rounded-2xl flex items-center justify-center text-zinc-500 hover:text-indigo-400 transition-all">
                            <i class="fas fa-paperclip text-lg"></i>
                        </button>

                        <textarea 
                            id="user-input" 
                            rows="1" 
                            placeholder="Ketik pesan untuk Zaam..." 
                            class="w-full bg-transparent border-none focus:ring-0 py-4 px-2 text-zinc-100 text-sm md:text-base max-h-60 resize-none font-medium"
                            oninput="resizeArea(this)"></textarea>

                        <button 
                            id="send-button" 
                            onclick="submitChat()"
                            class="mb-1.5 w-11 h-11 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-20 disabled:grayscale text-white rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20 transition-all active:scale-90">
                            <i class="fas fa-arrow-up text-sm"></i>
                        </button>
                    </div>
                </div>
                
                <div class="mt-6 flex justify-center items-center">
                    <p class="text-[9px] text-zinc-700 font-bold uppercase tracking-[0.5em]">Global AI Access &bull; Secure Protocol &bull; 2024</p>
                </div>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
    <script>
        // Sidebar Toggle for Mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
</body>
</html>
